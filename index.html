<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f0eb;
      --surface: #ffffff;
      --border:  #ddd8d2;
      --red:     #c0392b;
      --red-dk:  #962d22;
      --text:    #1a1a1a;
      --muted:   #888;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--red);
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { opacity: 0.6; font-weight: 400; font-size: 0.78rem; margin-left: 0.5rem; }

    .header-right { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }

    .search-wrap input {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      width: 200px;
      outline: none;
      transition: background 0.2s;
    }

    .search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
    .search-wrap input:focus { background: rgba(255,255,255,0.25); }

    /* Botão Adicionar */
    #btn-add {
      background: #fff;
      color: var(--red);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #btn-add:hover { background: #f5e8e7; }

    /* ── FILTROS ── */
    .filters {
      padding: 0.9rem 2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover  { border-color: var(--red); color: var(--red); }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── MAIN ── */
    main { padding: 1.5rem 2rem; }

    .gallery-status { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.2rem; }
    .gallery-status strong { color: var(--red); }

    /* ── GRID ── */
    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      min-height: 200px;
    }

    /* ── CARD ── */
    .img-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.35s forwards;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .img-card:hover { box-shadow: 0 4px 18px rgba(192,57,43,0.15); transform: translateY(-2px); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-img-wrap { position: relative; overflow: hidden; }

    .card-img-wrap img {
      width: 100%; height: 190px; object-fit: cover; display: block;
      transition: transform 0.4s;
    }

    .img-card:hover .card-img-wrap img { transform: scale(1.04); }

    /* Botão de remover */
    .card-delete {
      position: absolute;
      top: 0.5rem; right: 0.5rem;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 26px; height: 26px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
    }

    .img-card:hover .card-delete { opacity: 1; }
    .card-delete:hover { background: var(--red); }

    .card-info { padding: 0.75rem 0.85rem; }
    .card-tag  { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red); margin-bottom: 0.2rem; }
    .card-title{ font-size: 0.92rem; font-weight: 600; }
    .card-desc { font-size: 0.73rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.5; }

    .card-exit { animation: fadeOut 0.22s forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-8px); } }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--muted); }

    /* ── PAGINAÇÃO ── */
    .pagination { margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }

    .page-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: 0.8rem;
      min-width: 34px; height: 34px; padding: 0 0.65rem;
      border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
    }

    .page-btn:hover  { border-color: var(--red); color: var(--red); }
    .page-btn.active { background: var(--red); border-color: var(--red); color: #fff; font-weight: 600; }
    .page-btn:disabled { opacity: 0.3; pointer-events: none; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(20,10,10,0.88); z-index: 100;
      align-items: center; justify-content: center; padding: 2rem;
    }

    #lightbox.open { display: flex; animation: lbIn 0.25s; }
    @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }

    .lb-inner { max-width: 720px; width: 100%; position: relative; }
    .lb-inner img { width: 100%; max-height: 65vh; object-fit: contain; border-radius: var(--radius); }

    .lb-close {
      position: absolute; top: -2rem; right: 0;
      background: none; border: none; color: #fff;
      font-size: 1.2rem; cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
    }

    .lb-close:hover { opacity: 1; }
    .lb-meta  { margin-top: 0.7rem; color: #fff; }
    .lb-tag   { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #e07068; }
    .lb-title { font-size: 1.05rem; font-weight: 600; margin-top: 0.15rem; }

    /* ── MODAL ADICIONAR ── */
    #modal-add {
      display: none; position: fixed; inset: 0;
      background: rgba(20,10,10,0.7); z-index: 200;
      align-items: center; justify-content: center; padding: 1.5rem;
    }

    #modal-add.open { display: flex; animation: lbIn 0.25s; }

    .modal-box {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%; max-width: 460px;
      padding: 1.8rem;
      position: relative;
    }

    .modal-box h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: var(--red);
    }

    #modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none;
      color: var(--muted); font-size: 1.1rem;
      cursor: pointer; transition: color 0.2s;
    }

    #modal-close:hover { color: var(--red); }

    /* Campos do formulário */
    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 0.55rem 0.75rem;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--red); }

    .form-group textarea { resize: vertical; min-height: 70px; }

    /* Preview da imagem */
    #input-preview {
      display: none;
      width: 100%; height: 140px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-top: 0.6rem;
      border: 1px solid var(--border);
    }

    #cat-new-wrap { margin-top: 0.5rem; }

    /* Botão submit */
    .btn-submit {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.65rem;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: var(--red-dk); }

    @media (max-width: 600px) {
      header, .filters, main { padding-left: 1rem; padding-right: 1rem; }
      .search-wrap input { width: 140px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Galeria</div>
  <div class="header-right">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar..." />
    </div>
    <button id="btn-add">+ Adicionar imagem</button>
  </div>
</header>

<!-- FILTROS -->
<nav class="filters">
  <div id="filter-buttons"></div>
</nav>

<!-- GALERIA -->
<main>
  <div class="gallery-status" id="gallery-status"></div>
  <div id="gallery-grid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="" />
    <div class="lb-meta">
      <div class="lb-tag" id="lb-tag"></div>
      <div class="lb-title" id="lb-title"></div>
    </div>
  </div>
</div>

<!-- MODAL: ADICIONAR IMAGEM -->
<div id="modal-add">
  <div class="modal-box">
    <button id="modal-close">✕</button>
    <h2>Adicionar imagem</h2>

    <form id="form-add">
      <div class="form-group">
        <label for="input-file">Arquivo de imagem *</label>
        <input type="file" id="input-file" accept="image/*" />
        <img id="input-preview" src="" alt="Pré-visualização" />
      </div>

      <div class="form-group">
        <label for="input-title">Título *</label>
        <input type="text" id="input-title" placeholder="Ex: Pôr do sol na praia" />
      </div>

      <div class="form-group">
        <label for="input-category">Categoria *</label>
        <select id="input-category"></select>
        <div id="cat-new-wrap" style="display:none">
          <input type="text" id="input-cat-new" placeholder="Nome da nova categoria" />
        </div>
      </div>

      <div class="form-group">
        <label for="input-desc">Descrição</label>
        <textarea id="input-desc" placeholder="Descrição opcional da imagem…"></textarea>
      </div>

      <button type="submit" class="btn-submit">Adicionar à galeria</button>
    </form>
  </div>
</div>

<!-- JS (ordem importa!) -->
<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>
<script src="js/app.js"></script>

</body>
</html>
