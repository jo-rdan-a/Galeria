<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Galeria</div>
  <div class="header-right">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar..." />
    </div>
    <button id="btn-add">+ Adicionar imagem</button>
  </div>
</header>

<!-- GALERIA -->
<main>
  <div class="gallery-status" id="gallery-status"></div>
  <div id="gallery-grid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- FILTROS (barra inferior) -->
<nav class="filters" aria-label="Filtrar por categoria">
  <div id="filter-buttons"></div>
</nav>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lb-inner">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="" />
    <div class="lb-meta">
      <div class="lb-tag" id="lb-tag"></div>
      <div class="lb-title" id="lb-title"></div>
    </div>
  </div>
</div>

<!-- MODAL: ADICIONAR IMAGEM -->
<div id="modal-add">
  <div class="modal-box">
    <button id="modal-close">✕</button>
    <h2>Adicionar imagem</h2>

    <form id="form-add">
      <div class="form-group">
        <label for="input-file">Arquivo de imagem *</label>
        <input type="file" id="input-file" accept="image/*" />
        <img id="input-preview" src="" alt="Pré-visualização" />
      </div>

      <div class="form-group">
        <label for="input-title">Título *</label>
        <input type="text" id="input-title" placeholder="Ex: Pôr do sol na praia" />
      </div>

      <div class="form-group">
        <label for="input-category">Categoria *</label>
        <select id="input-category"></select>
        <div id="cat-new-wrap" style="display:none">
          <input type="text" id="input-cat-new" placeholder="Nome da nova categoria" />
        </div>
      </div>

      <div class="form-group">
        <label for="input-desc">Descrição</label>
        <textarea id="input-desc" placeholder="Descrição opcional da imagem…"></textarea>
      </div>

      <button type="submit" class="btn-submit">Adicionar à galeria</button>
    </form>
  </div>
</div>

<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>
<script src="js/app.js"></script>

</body>
</html>
